{% extends "base.html" %}

{% block title %}Sign In — ChartLens{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-8rem)] py-12 px-4">
  <div class="w-full max-w-[400px]">

    <!-- Card -->
    <div class="bg-white rounded-lg shadow-sm border border-[#d4c9b0] p-8">

      <!-- Icon + heading -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-[#1e3a5f] mb-4">
          <svg width="32" height="32" class="text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <h1 class="font-display text-2xl font-bold text-navy">Sign In to ChartLens</h1>
        <p class="text-sm text-[#6b7280] mt-1">Welcome back</p>
      </div>

      <!-- Error banner -->
      {% if error %}
        <div class="flex items-center gap-2 rounded-md border border-red-200 bg-red-50 p-3 mb-5
                    text-[#dc2626] text-sm">
          <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                  d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                  clip-rule="evenodd"/>
          </svg>
          <span>{{ error }}</span>
        </div>
      {% endif %}

      <!-- Form -->
      <form action="/auth/login" method="post" class="space-y-4" novalidate>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
            Email
          </label>
          <input id="email" name="email" type="email" required autocomplete="email"
                 class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-[#2563eb] focus:border-[#2563eb]
                        placeholder-gray-400 transition"
                 placeholder="you@yourfirm.com" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
                 class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-[#2563eb] focus:border-[#2563eb]
                        placeholder-gray-400 transition"
                 placeholder="••••••••" />
        </div>

        <div class="flex items-center">
          <input id="remember" name="remember" type="checkbox"
                 class="h-4 w-4 rounded border-gray-300 text-[#2563eb] focus:ring-[#2563eb]" />
          <label for="remember" class="ml-2 text-sm text-gray-600">Remember me</label>
        </div>

        <button type="submit"
                class="w-full bg-action-blue hover:bg-blue-700 text-white font-semibold py-2.5 px-4
                       rounded-md text-sm transition-colors focus:outline-none focus:ring-2
                       focus:ring-[#2563eb] focus:ring-offset-2">
          Sign In
        </button>

      </form>

    </div>

    <!-- Below-card link -->
    <p class="text-center text-sm text-gray-600 mt-5">
      Don't have an account?
      <a href="/register" class="text-[#2563eb] hover:text-blue-700 font-medium">Register here</a>
    </p>

  </div>
</div>
{% endblock %}
