{% extends "base.html" %}

{% block title %}Upgrade Canceled — ChartLens{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 sm:px-6 py-24 text-center">

  <!-- Neutral icon -->
  <div class="flex justify-center mb-6">
    <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center">
      <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
  </div>

  <h1 class="font-display text-3xl font-bold text-navy mb-3">No problem.</h1>
  <p class="text-gray-500 text-base mb-10">
    Your trial is still active. You can upgrade whenever you're ready.
  </p>

  <div id="retry-error" class="hidden mb-6 rounded-md border border-red-200 bg-red-50 p-3 text-sm text-[#dc2626]"></div>

  <div class="flex items-center justify-center gap-3 flex-wrap">
    <button id="retry-btn"
            class="inline-flex items-center gap-2 bg-[#2563eb] hover:bg-blue-700 text-white
                   text-sm font-semibold px-5 py-2.5 rounded-md transition-colors">
      Try Again
    </button>
    <a href="/dashboard"
       class="inline-flex items-center bg-white border border-gray-300 hover:bg-gray-50
              text-gray-700 text-sm font-semibold px-5 py-2.5 rounded-md transition-colors">
      Back to Dashboard
    </a>
  </div>

</div>

<script>
  (function () {
    var retryBtn = document.getElementById('retry-btn');
    var errBox   = document.getElementById('retry-error');

    retryBtn.addEventListener('click', function () {
      retryBtn.disabled = true;
      retryBtn.textContent = 'Redirecting…';
      errBox.classList.add('hidden');

      fetch('/billing/subscribe', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' }
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.checkout_url) {
            window.location = data.checkout_url;
          } else {
            throw new Error(data.detail || 'Could not start checkout. Please try again.');
          }
        })
        .catch(function (err) {
          errBox.textContent = err.message || 'An unexpected error occurred.';
          errBox.classList.remove('hidden');
          retryBtn.disabled = false;
          retryBtn.textContent = 'Try Again';
        });
    });
  }());
</script>

{% endblock %}
