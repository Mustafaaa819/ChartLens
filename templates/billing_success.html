{% extends "base.html" %}

{% block title %}Subscription Active — ChartLens{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 sm:px-6 py-24 text-center">

  <!-- Success icon -->
  <div class="flex justify-center mb-6">
    <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
      <svg class="w-8 h-8 text-[#16a34a]" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
      </svg>
    </div>
  </div>

  <h1 class="text-3xl font-bold text-[#1e3a5f] mb-3">You're all set.</h1>
  <p class="text-gray-500 text-base mb-10">
    Your ChartLens Pro subscription is active. Start analyzing your first case.
  </p>

  <a href="/dashboard"
     class="inline-flex items-center gap-2 bg-[#2563eb] hover:bg-blue-700 text-white
            text-sm font-semibold px-6 py-3 rounded-md transition-colors">
    Go to Dashboard
  </a>

</div>
{% endblock %}
